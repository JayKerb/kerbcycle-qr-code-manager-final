version: 2

updates:
  # GitHub Actions:
  # Group minor/patch action updates, but let major action updates open separately.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      #day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 8
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  # Composer:
  # Group safe routine updates, but keep major updates separate.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "daily"
      #day: "monday"
      time: "06:30"
      timezone: "America/New_York"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "composer"
      - "php"
    groups:
      composer-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  # npm:
  # Group routine JS/tooling updates, but keep major updates separate.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      #day: "monday"
      time: "07:00"
      timezone: "America/New_York"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "javascript"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"