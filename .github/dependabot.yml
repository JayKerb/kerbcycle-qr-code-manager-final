version: 2

updates:
  # Keep pinned GitHub Actions moving forward.
  # Dependabot will open PRs when workflow action references can be updated.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    groups:
      github-actions:
        patterns:
          - "*"

  # Keep Composer-based PHP tooling updated:
  # PHPUnit, PHPCS/WPCS, PHPStan, Psalm, and other Composer dependencies.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "composer"
      - "php"
    groups:
      composer-dependencies:
        patterns:
          - "*"

  # Keep npm-based tooling updated:
  # ESLint, Playwright, JS tooling, and packages in package-lock.json.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "npm"
      - "javascript"
    groups:
      npm-dependencies:
        patterns:
          - "*"
