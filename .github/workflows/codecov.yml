name: Advisory - Codecov

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  php-coverage:
    name: advisory / codecov
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
      WP_CORE_DIR: /tmp/wordpress
      DB_HOST: 127.0.0.1
      DB_NAME: wordpress_test
      DB_USER: wordpress
      DB_PASS: wordpress

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          coverage: xdebug
          tools: composer:v2

      - name: Show PHP version
        run: php -v

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install WordPress test suite
        run: |
          curl -fsSL -o /tmp/install-wp-tests.sh https://raw.githubusercontent.com/wp-cli/scaffold-command/master/templates/install-wp-tests.sh
          chmod +x /tmp/install-wp-tests.sh
          echo "y" | /tmp/install-wp-tests.sh "$DB_NAME" "$DB_USER" "$DB_PASS" "$DB_HOST" latest

      - name: Run PHPUnit with coverage
        env:
          XDEBUG_MODE: coverage
        run: vendor/bin/phpunit -c phpunit.xml.dist --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f #v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: php
          name: kerbcycle-php
          fail_ci_if_error: true

      - name: Write Codecov advisory summary
        if: always()
        run: |
          {
            echo "## Advisory Check: Codecov"
            echo ""
            echo "- Policy: coverage reporting is advisory at this stage."
            echo "- Scope: test coverage visibility."
            echo "- Blocking behavior: this job should not block ordinary PRs yet."
            echo "- Result: review Codecov output or linked dashboard."
            echo ""
            echo "Patch coverage can become blocking later after the coverage baseline is stable."
          } >> "$GITHUB_STEP_SUMMARY"
