name: ESLint JS

on:
  pull_request:
    paths:
      - 'assets/js/**/*.js'
      - 'admin/js/**/*.js'
      - 'eslint.config.cjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/eslint-js.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eslint:
    name: ESLint JS report-only
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        continue-on-error: true
        run: npm run lint:js