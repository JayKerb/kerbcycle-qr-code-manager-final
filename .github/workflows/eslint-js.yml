name: ESLint JS

on:
  pull_request:
    paths:
      - 'assets/js/**/*.js'
      - 'admin/js/**/*.js'
      - 'eslint.config.cjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/eslint-js.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eslint:
    name: ESLint JS report-only
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        continue-on-error: true
        run: npm run lint:js