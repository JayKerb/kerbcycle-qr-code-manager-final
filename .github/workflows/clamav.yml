name: Scheduled - ClamAV Malware Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * *'
  
permissions:
  contents: read

concurrency:
  group: clamav-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clamav:
    name: scheduled / clamav
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Prepare scan output
        run: mkdir -p clamav-output

      - name: Pull ClamAV image
        run: docker pull clamav/clamav:stable@sha256:8df57e58b9127333f9ab5748a03a0f80f99d3c4830727c1c9ba9bffaa45a1b9c

      - name: Run ClamAV scan
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            --mount type=bind,source="${GITHUB_WORKSPACE}",target=/scan,readonly \
            --mount type=bind,source="${GITHUB_WORKSPACE}/clamav-output",target=/output \
            clamav/clamav:stable@sha256:8df57e58b9127333f9ab5748a03a0f80f99d3c4830727c1c9ba9bffaa45a1b9c \
            clamscan \
              --recursive \
              --infected \
              --log=/output/clamav-scan.log \
              --exclude-dir='^/scan/\.git' \
              --exclude-dir='^/scan/clamav-output' \
              --max-filesize=100M \
              --max-scansize=400M \
              /scan

      - name: Fix ClamAV scan log permissions
        if: always()
        run: sudo chown -R "$USER":"$USER" clamav-output

      - name: Upload ClamAV scan log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: clamav-scan-log
          path: clamav-output/clamav-scan.log
          if-no-files-found: warn
          retention-days: 14

      - name: Write ClamAV scheduled summary
        if: always()
        run: |
          {
            echo "## Scheduled Check: ClamAV"
            echo ""
            echo "- Policy: malware scanning is scheduled/manual, not a normal PR blocker."
            echo "- Scope: repository file scan."
            echo "- Blocking behavior: this workflow should not block ordinary PRs."
            echo "- Result: review job logs and uploaded artifacts."
            echo ""
            echo "Review this before major releases or after suspicious repository activity."
          } >> "$GITHUB_STEP_SUMMARY"
