name: PHPCS

on:
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpcs.xml.dist'
      - '.github/workflows/phpcs.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  phpcs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      #- name: Run PHPCS
        #id: phpcs
        #continue-on-error: true
        #run: |
          #vendor/bin/phpcs --standard=phpcs.xml.dist --report=checkstyle > phpcs-report.xml

      - name: Collect changed PHP files for drift-prevention gate
        id: changed_php
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '\.php$' \
            | grep -v '^vendor/' \
            | grep -v '^node_modules/' \
            > changed-php-files.txt || true

          if [ ! -s changed-php-files.txt ]; then
            echo "has_php_files=false" >> "$GITHUB_OUTPUT"
            echo "No changed PHP files to check."
          else
            echo "has_php_files=true" >> "$GITHUB_OUTPUT"
            echo "Changed PHP files to scan:"
            cat changed-php-files.txt
          fi

      - name: Run PHPCS changed-files blocking gate
        if: steps.changed_php.outputs.has_php_files == 'true'
        run: |
          set -euo pipefail

          if [ -s changed-php-files.txt ]; then
            xargs -a changed-php-files.txt vendor/bin/phpcs --standard=phpcs.xml.dist
          else
            echo "No changed PHP files to lint."
          fi

      #- name: Annotate PHPCS results
        #if: always()
        #uses: jwgmeligmeyling/checkstyle-github-action@a12be500c097a5cedab881d4785ef9b4a4d3ee6a
        #with:
          #path: phpcs-report.xml

