name: Required - PHPCS

on:
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpcs.xml.dist'
      - '.github/workflows/phpcs.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  phpcs:
    name: required / phpcs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      #- name: Run PHPCS
        #id: phpcs
        #continue-on-error: true
        #run: |
          #vendor/bin/phpcs --standard=phpcs.xml.dist --report=checkstyle > phpcs-report.xml

      - name: Collect changed PHP files for drift-prevention gate
        id: changed_php
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '\.php$' \
            | grep -v '^vendor/' \
            | grep -v '^node_modules/' \
            > changed-php-files.txt || true

          if [ ! -s changed-php-files.txt ]; then
            echo "has_php_files=false" >> "$GITHUB_OUTPUT"
            echo "No changed PHP files to check."
          else
            echo "has_php_files=true" >> "$GITHUB_OUTPUT"
            echo "Changed PHP files to scan:"
            cat changed-php-files.txt
          fi

      - name: Run PHPCS changed-files blocking gate
        if: steps.changed_php.outputs.has_php_files == 'true'
        run: |
          set -euo pipefail

          if [ -s changed-php-files.txt ]; then
            xargs -a changed-php-files.txt vendor/bin/phpcs --standard=phpcs.xml.dist
          else
            echo "No changed PHP files to lint."
          fi

      - name: Write PHPCS summary
        if: always()
        env:
          HAS_PHP_FILES: ${{ steps.changed_php.outputs.has_php_files }}
        run: |
          {
            echo "## Required Check: PHPCS"
            echo ""
            echo "- Policy: changed PHP files must pass PHPCS."
            echo "- Scope: changed PHP files only."
            echo "- Result: see job status above."

            if [ "$HAS_PHP_FILES" = "true" ]; then
              echo ""
              echo "### Changed PHP files checked"
              echo ""
              if [ -s changed-php-files.txt ]; then
                sed 's/^/- `/' changed-php-files.txt | sed 's/$/`/'
              else
                echo "- No changed PHP files were listed."
              fi
            else
              echo ""
              echo "No changed PHP files were detected, so PHPCS did not run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      #- name: Annotate PHPCS results
        #if: always()
        #uses: jwgmeligmeyling/checkstyle-github-action@a12be500c097a5cedab881d4785ef9b4a4d3ee6a
        #with:
          #path: phpcs-report.xml

