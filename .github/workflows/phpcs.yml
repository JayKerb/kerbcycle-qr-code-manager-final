name: PHPCS

on:
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpcs.xml.dist'
      - '.github/workflows/phpcs.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  phpcs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      #- name: Run PHPCS
        #id: phpcs
        #continue-on-error: true
        #run: |
          #vendor/bin/phpcs --standard=phpcs.xml.dist --report=checkstyle > phpcs-report.xml

      - name: Explain PHPCS baseline behavior
        run: |
          echo "This workflow fails when PHPCS finds WordPress coding-standard violations."
          echo "A failure here means the scan completed and found issues; it does not necessarily mean CI setup is broken."

      - name: Check WordPress coding standards with PHPCS
        run: vendor/bin/phpcs --standard=phpcs.xml.dist --report=summary

      #- name: Annotate PHPCS results
        #if: always()
        #uses: jwgmeligmeyling/checkstyle-github-action@a12be500c097a5cedab881d4785ef9b4a4d3ee6a
        #with:
          #path: phpcs-report.xml

      - name: Fail if PHPCS found violations
        if: steps.phpcs.outcome == 'failure'
        run: exit 1
