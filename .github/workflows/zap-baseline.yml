name: Scheduled - OWASP ZAP Baseline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    name: scheduled / zap-baseline
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Prepare Basic Auth header
        env:
          BASIC_USER: ${{ secrets.ZAP_BASIC_AUTH_USER }}
          BASIC_PASS: ${{ secrets.ZAP_BASIC_AUTH_PASSWORD }}
        run: |
          TOKEN="$(printf '%s:%s' "$BASIC_USER" "$BASIC_PASS" | base64 -w 0)"
          HEADER_VALUE="Basic $TOKEN"

          echo "::add-mask::$TOKEN"
          echo "::add-mask::$HEADER_VALUE"

          echo "ZAP_AUTH_HEADER_VALUE=$HEADER_VALUE" >> "$GITHUB_ENV"
                  
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: ${{ env.ZAP_AUTH_HEADER_VALUE }}
          #ZAP_AUTH_HEADER_SITE: ${{ secrets.ZAP_TARGET_URL }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ secrets.ZAP_TARGET_URL }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          rules_file_name: .zap/rules.tsv
          artifact_name: zap_baseline_report
          allow_issue_writing: false
          fail_action: false
          cmd_options: "-I -m 2"

      - name: Write ZAP scheduled summary
        if: always()
        run: |
          {
            echo "## Scheduled Check: ZAP Baseline"
            echo ""
            echo "- Policy: staging-site dynamic scanning is scheduled/manual, not a normal PR blocker."
            echo "- Scope: OWASP ZAP baseline scan against the configured target."
            echo "- Blocking behavior: this workflow should not block ordinary PRs."
            echo "- Result: review job logs and uploaded ZAP report artifacts."
            echo ""
            echo "Because this depends on staging availability and authentication, findings should be manually triaged."
          } >> "$GITHUB_STEP_SUMMARY"
