name: OWASP ZAP Baseline

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check staging with Basic Auth
        env:
          TARGET_URL: ${{ secrets.ZAP_TARGET_URL }}
          BASIC_TOKEN: ${{ secrets.ZAP_BASIC_AUTH_TOKEN }}
        run: |
          curl -I -L --max-time 30 \
            -H "Authorization: Basic $BASIC_TOKEN" \
            "$TARGET_URL"

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: Basic ${{ secrets.ZAP_BASIC_AUTH_TOKEN }}
          ZAP_AUTH_HEADER_SITE: ${{ secrets.ZAP_TARGET_URL }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ secrets.ZAP_TARGET_URL }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          rules_file_name: .zap/rules.tsv
          artifact_name: zap_baseline_report
          allow_issue_writing: false
          fail_action: false
          cmd_options: "-I -m 2"
