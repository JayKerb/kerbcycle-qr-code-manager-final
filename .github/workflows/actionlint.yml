# .github/workflows/actionlint.yml

name: Required - actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: required / actionlint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint

      - name: Write actionlint summary
        if: always()
        run: |
          {
            echo "## Required Check: actionlint"
            echo ""
            echo "- Policy: GitHub Actions workflow syntax and structural issues must be fixed."
            echo "- Scope: workflow files under .github/workflows."
            echo "- Result: see job status above."
            echo ""
            echo "This check is intended to fail the PR if workflow linting fails."
          } >> "$GITHUB_STEP_SUMMARY"